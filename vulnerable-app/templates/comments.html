<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XSS Lab</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .comment {
            background-color: #1f2937;
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>XSS Security Lab</h1>

    <form method="POST" action="/comments">
        <textarea name="comment" placeholder="Escribe un comentario..."></textarea>

        <button type="submit">
            Publicar comentario
        </button>
    </form>

    {% for comment in comments %}
        <div class="comment">
            {{ comment|safe }} 
        </div>
    {% endfor %}

</div>

</body>
</html>
